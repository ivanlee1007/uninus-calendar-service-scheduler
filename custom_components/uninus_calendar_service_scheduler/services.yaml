          domain: calendar
    summary:
      required: true
      selector:
        text:
    start:
      required: true
      selector:
        text:
    end:
      required: false
      selector:
        text:
    all_day:
      required: false
      selector:
        boolean:
    location:
      required: false
      selector:
        text:
    rrule:
      required: false
      selector:
        text:
    service:
      name: Start service
      description: Service to run when the calendar event starts. Leave empty if only an end action is needed.
      required: false
      selector:
        text:
    target:
      name: Start target
      required: false
      selector:
        object:
    data:
      name: Start data
      required: false
      selector:
        object:
    end_service:
      name: End service
      description: Service to run when the calendar event ends. Leave empty if no end action is needed.
      required: false
      selector:
        text:
    end_target:
      name: End target
      required: false
      selector:
        object:
    end_data:
      name: End data
      required: false
      selector:
        object:
    description:
      required: false
      selector:
        text:
          multiline: true

delete_event_action:
  name: Delete service action
  description: Delete the stored service action and cancel its timer. Calendar event deletion is handled by the panel when available.
  fields:
    action_id:
      required: true
      selector:
        text:

test_action:
  name: Test action
  description: Immediately execute a stored action.
  fields:
    action_id:
      required: true
      selector:
        text:

reload_actions:
  name: Reload actions
  description: Rebuild timers from stored actions.

create_farm:
  name: Create traceability farm
  description: Create a farm/operator record for agricultural traceability.
  fields:
    name:
      required: true
      selector:
        text:
    operator:
      required: false
      selector:
        text:
    address:
      required: false
      selector:
        text:
    phone:
      required: false
      selector:
        text:

create_plot:
  name: Create traceability plot
  description: Create a field, facility, pond, house, or production site under a farm.
  fields:
    farm_id:
      required: true
      selector:
        text:
    name:
      required: true
      selector:
        text:
    product:
      required: false
      selector:
        text:
    tgap_category:
      required: false
      selector:
        select:
          options:
            - 農糧
            - 水果類
            - 蔬菜類
            - 水稻
            - 雜糧類
            - 畜禽
            - 水產
            - 分裝流通
            - 林產品
    area:
      required: false
      selector:
        text:
    location:
      required: false
      selector:
        text:

create_crop_cycle:
  name: Create traceability production cycle
  description: Create a production cycle or lot for traceability records.
  fields:
    plot_id:
      required: true
      selector:
        text:
    product:
      required: true
      selector:
        text:
    variety:
      required: false
      selector:
        text:
    lot_number:
      required: false
      selector:
        text:
    trace_code:
      required: false
      selector:
        text:
    start_date:
      required: false
      selector:
        date:
    expected_harvest_date:
      required: false
      selector:
        date:

create_agri_operation:
  name: Create agricultural traceability operation
  description: Record a planned or completed production operation, optionally snapshotting Home Assistant entities.
  fields:
    cycle_id:
      required: true
      selector:
        text:
    operation_type:
      required: true
      selector:
        select:
          options:
            - 播種/定植
            - 灌溉
            - 施肥
            - 病蟲害防治
            - 除草
            - 採收
            - 分級包裝
            - 清潔消毒
            - 自我查核
            - 異常事件
    scheduled_start:
      required: false
      selector:
        text:
    actual_start:
      required: false
      selector:
        text:
    operator:
      required: false
      selector:
        text:
    material_name:
      required: false
      selector:
        text:
    quantity:
      required: false
      selector:
        text:
    unit:
      required: false
      selector:
        text:
    sensor_entities:
      required: false
      selector:
        entity:
          multiple: true
    sensor_snapshot:
      required: false
      selector:
        object:
    notes:
      required: false
      selector:
        text:
          multiline: true
    status:
      required: false
      selector:
        select:
          options:
            - planned
            - completed
            - skipped
            - verified
            - exported

export_traceability_records:
  name: Export traceability records
  description: Return flattened operation rows and summary for audit/export workflows.
