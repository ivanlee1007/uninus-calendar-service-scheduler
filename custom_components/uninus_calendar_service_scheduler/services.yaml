create_event_action:
  name: Create calendar service action
  description: Create a Local Calendar event and bind it to a Home Assistant service call.
  fields:
    calendar_entity:
      required: true
      selector:
        entity:
          domain: calendar
    summary:
      required: true
      selector:
        text:
    start:
      required: true
      example: "2026-07-05T19:00:00+08:00"
      selector:
        text:
    end:
      required: false
      example: "2026-07-05T19:05:00+08:00"
      selector:
        text:
    all_day:
      required: false
      selector:
        boolean:
    location:
      required: false
      selector:
        text:
    rrule:
      required: false
      example: "FREQ=WEEKLY;COUNT=4"
      selector:
        text:
    service:
      name: Start service
      description: Service to run when the calendar event starts. Leave empty if only an end action is needed.
      required: false
      example: light.turn_on
      selector:
        text:
    target:
      name: Start target
      required: false
      selector:
        object:
    data:
      name: Start data
      required: false
      selector:
        object:
    end_service:
      name: End service
      description: Service to run when the calendar event ends. Leave empty if no end action is needed.
      required: false
      example: light.turn_off
      selector:
        text:
    end_target:
      name: End target
      required: false
      selector:
        object:
    end_data:
      name: End data
      required: false
      selector:
        object:
    description:
      required: false
      selector:
        text:
          multiline: true

