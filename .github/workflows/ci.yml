name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python dev tools
        run: python -m pip install -r requirements-dev.txt
      - name: Python syntax
        run: python -m compileall custom_components tests
      - name: Ruff
        run: ruff check custom_components tests
      - name: Pytest
        run: pytest -q
      - name: Frontend syntax
        run: node --check custom_components/uninus_calendar_service_scheduler/www/uninus-calendar-service-scheduler-card.js
      - name: Validate JSON
        run: |
          python -m json.tool custom_components/uninus_calendar_service_scheduler/manifest.json >/dev/null
          python -m json.tool custom_components/uninus_calendar_service_scheduler/translations/en.json >/dev/null
          python -m json.tool custom_components/uninus_calendar_service_scheduler/translations/zh-Hant.json >/dev/null
          python -m json.tool hacs.json >/dev/null
